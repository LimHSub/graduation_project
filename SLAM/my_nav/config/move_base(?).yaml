TebLocalPlannerROS:
  # ======== 기본 설정 ========
  odom_topic: odometry/filtered
  map_frame: map   # 사용하시는 map frame 이름으로 설정하세요. (예: map)

  # ======== 로봇 사양 (안정성을 위해 보수적으로 설정) ========
  # 선속도 대비 각속도를 낮춰 지그재그 현상 방지
  max_vel_x: 0.3                # 최대 전진 속도 0.3m/s
  max_vel_x_backwards: 0.1      # 최대 후진 속도 0.1m/s
  max_vel_theta: 0.3            # 최대 회전 속도
  acc_lim_x: 0.5                # 가속도
  acc_lim_theta: 0.3

  # 차동 구동 로봇의 경우 0.0, Ackerman 방식의 경우 실제 최소 회전 반경 입력
  min_turning_radius: 0.0

  # 로봇의 실제 footprint 설정 (매우 중요)
  footprint_model:
    type: "polygon"
    vertices: [[0.26, 0.26], [0.26, -0.26], [-0.26, -0.26], [-0.26, 0.26]]

  # ======== 궤적 설정 (Trajectory) ========
  teb_autosize: true            # 경로의 점 자동 조절
  dt_ref: 0.3                   # 경로의 시간 해상도 (0.3~0.6 권장)
  dt_hysteresis: 0.1
  global_plan_overwrite_orientation: false
  max_global_plan_lookahead_dist: 3.0
  feasibility_check_no_poses: 4

  # ======== 목표점 도달 허용 오차 (Goal Tolerance) ========
  xy_goal_tolerance: 0.3
  yaw_goal_tolerance: 0.10
  free_goal_vel: false

  # ======== 장애물 설정 (Obstacles) ========
  min_obstacle_dist: 0.20       # 로봇과 장애물 최소 이격 거리
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 1.0
  obstacle_poses_affected: 10

  # ======== 최적화 가중치 (Weights) ========
  optimization_activate: true
  no_inner_iterations: 5
  no_outer_iterations: 4

  weight_optimaltime: 1.0
  weight_kinematics_nh: 1000.0
  weight_kinematics_forward_drive: 2000.0
  #penalty_epsilon: 0.2   # ⚠️ max_vel_x_backwards=0.1보다 크면 경고 발생 → 0.1 이하 권장

  # 너무 높으면 진동 원인
  weight_shortest_path: 0.5
  weight_obstacle: 50.0

  # 속도/가속도 한계 초과 페널티
  weight_max_vel_x: 2.0
  weight_max_vel_theta: 1.0
  weight_acc_lim_x: 1.0
  weight_acc_lim_theta: 1.0

  # 사용하지 않는 가중치는 0.0
  weight_kinematics_turning_radius: 0.0
  weight_viapoint: 0.0

  # ======== 고급 장애물 회피 (Homotopy Class Planning) ========
  enable_homotopy_class_planning: true
  enable_multithreading: true
  max_number_classes: 4

  # ======== 각도 오차 맞추기 추가 파라미터 ========
  weight_goal_orientation: 50.0   # (30~80 범위 테스트)

GlobalPlanner:
  allow_unknown: false
  default_tolerance: 0.3
  use_quadratic: true
  use_dijkstra: true
  use_grid_path: false
  lethal_cost: 253
  neutral_cost: 50
  cost_factor: 10.0

