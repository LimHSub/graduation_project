global_costmap:
  global_frame: map
  robot_base_frame: base_link

  update_frequency: 3.0
  publish_frequency: 2.0

  rolling_window: false
  static_map: true
  transform_tolerance: 1.0
  track_unknown_space: false

  plugins:
    - {name: static_layer,      type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer,    type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer,   type: "costmap_2d::InflationLayer"}
    - {name: prohibition_layer, type: "costmap_prohibition_layer_namespace::CostmapProhibitionLayer"}

  static_layer:
    map_topic: /map
    first_map_only: false
    subscribe_to_updates: true
    trinary_costmap: false

  obstacle_layer:
    observation_sources: laser_scan_sensor

    laser_scan_sensor:
      data_type: LaserScan
      topic: /scan_filtered
      sensor_frame: laser_frame

      marking: true
      clearing: true

      expected_update_rate: 0.0
      observation_persistence: 0.0

      inf_is_valid: true
      obstacle_range: 6.0      # 기존 5.0
      raytrace_range: 8.0      # 기존 7.0
      max_obstacle_height: 2.0

  inflation_layer:
    inflation_radius: 0.50
    cost_scaling_factor: 5.0


local_costmap:
  global_frame: odom
  robot_base_frame: base_link

  rolling_window: true
  static_map: false
  track_unknown_space: false

  update_frequency: 5.0
  publish_frequency: 3.0

  width: 5.0
  height: 5.0
  resolution: 0.05

  transform_tolerance: 1.0

  plugins:
    - {name: stvl_layer,      type: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  stvl_layer:
    enabled: true

    # 핵심: 일정 시간 재관측되지 않는 장애물 cost 제거
    voxel_decay: 2.0
    decay_model: 0

    # local costmap에서는 false 권장
    mapping_mode: false

    # 디버깅할 때만 true, 평소에는 false
    publish_voxel_map: false

    observation_sources: laser_scan_sensor

    laser_scan_sensor:
      data_type: LaserScan
      topic: /scan_filtered
      sensor_frame: laser_frame

      marking: true
      clearing: true

      expected_update_rate: 0.0
      observation_persistence: 0.0

      obstacle_range: 4.0
      raytrace_range: 5.0
      inf_is_valid: true

      min_obstacle_height: -0.1
      max_obstacle_height: 2.0

  inflation_layer:
    inflation_radius: 0.50
    cost_scaling_factor: 3.0

  footprint: [[0.320, 0.255], [0.320, -0.255], [-0.320, -0.255], [-0.320, 0.255]]
  footprint_padding: 0.03
