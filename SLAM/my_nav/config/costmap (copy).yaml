global_costmap:
  global_frame: map
  robot_base_frame: base_link
  update_frequency: 1.0
  publish_frequency: 1.0
  rolling_window: false
  static_map: true
  transform_tolerance: 1.0
  track_unknown_space: false
  
  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
    - {name: prohibition_layer, type: "costmap_prohibition_layer_namespace::CostmapProhibitionLayer"}

  static_layer:
    map_topic: /map
    first_map_only: true
    subscribe_to_updates: true
    trinary_costmap: false

  obstacle_layer:
    observation_sources: laser_scan_sensor
    laser_scan_sensor:
      data_type: LaserScan
      topic: /scan_filtered
      sensor_frame: laser_frame
      marking: true
      clearing: true
      expected_update_rate: 10
      observation_persistence: 0.12
    obstacle_range: 3.0
    raytrace_range: 3.5
    max_obstacle_height: 2.0

  inflation_layer:
    inflation_radius: 0.75
    cost_scaling_factor: 5.0

local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  rolling_window: true
  update_frequency: 3.0       # (costmap 갱신 빈도, Hz)
  publish_frequency: 2.0      # (costmap publish 빈도, Hz)
  static_map: false
  width: 6.0                  # (로컬 costmap 가로길이, m)
  height: 6.0                 # (로컬 costmap 세로길이, m)
  resolution: 0.12            # (셀 크기, m/px)
  #origin_x: -2.0
  #origin_y: -2.0
  transform_tolerance: 0.5
  plugins:
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
    #- {name: prohibition_layer, type: "costmap_prohibition_layer_namespace::CostmapProhibitionLayer"}

  obstacle_layer:
    observation_sources: laser_scan_sensor
    laser_scan_sensor:
      data_type: LaserScan
      topic: /scan_filtered
      sensor_frame: laser_frame
      rolling_window: true
      marking: true
      clearing: true
      expected_update_rate: 10
      observation_persistence: 0.12  # 너무 오래 안남게(=유령 장애물 빨리 삭제)
    obstacle_range: 2.5        # (장애물로 인식할 최대 거리, m)
                                # ↑크면 더 먼 장애물까지 반영
    raytrace_range: 2.7         # (공간 비우기 위해 사용하는 최대 거리, m)
                                # ↑크면 clearing이 더 먼 거리까지
    max_obstacle_height: 2.0
  inflation_layer:
    inflation_radius: 0.5      # (장애물 주변 버퍼 영역, 0.75m)
                                # ↑크면 좁은 공간에 통로가 사라질 수 있음
    cost_scaling_factor: 5.0

footprint: [[0.26, 0.26], [0.26, -0.26], [-0.26, -0.26], [-0.26, 0.26]]
# (로봇의 외곽 치수, m 단위)
# ↑크면 costmap에서 더 큰 영역이 로봇으로 간주(실제보다 크게 잡으면 통로가 좁아짐)
# ↓작게 잡으면 실제보다 위험하게 움직임(벽에 더 가까이 접근)
