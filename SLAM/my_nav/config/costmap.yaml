global_costmap:
  global_frame: map
  robot_base_frame: base_link

  update_frequency: 3.0
  publish_frequency: 2.0

  rolling_window: false
  static_map: true
  transform_tolerance: 1.0
  track_unknown_space: false

  plugins:
    - {name: static_layer,      type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer,    type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer,   type: "costmap_2d::InflationLayer"}
    - {name: prohibition_layer, type: "costmap_prohibition_layer_namespace::CostmapProhibitionLayer"}

  static_layer:
    map_topic: /map
    first_map_only: false
    subscribe_to_updates: true
    trinary_costmap: false

  obstacle_layer:
    observation_sources: laser_scan_sensor

    laser_scan_sensor:
      data_type: LaserScan
      topic: /scan_filtered
      sensor_frame: laser_frame

      marking: true
      clearing: true

      expected_update_rate: 10
      observation_persistence: 0.0

      inf_is_valid: true
      obstacle_range: 6.0      # 기존 5.0
      raytrace_range: 8.0      # 기존 7.0
      max_obstacle_height: 2.0

  inflation_layer:
    inflation_radius: 0.55
    cost_scaling_factor: 5.0


local_costmap:
  global_frame: odom
  robot_base_frame: base_link

  rolling_window: true
  static_map: false

  update_frequency: 5.0       # costmap 갱신 빈도 (Hz)
  publish_frequency: 3.0      # costmap publish 빈도 (Hz)

  width: 5.0                  # 로컬 costmap 가로 길이 (m)
  height: 5.0                 # 로컬 costmap 세로 길이 (m)
  resolution: 0.12            # 셀 크기 (m/px)

  # origin_x: -2.0
  # origin_y: -2.0

  transform_tolerance: 1.0

  plugins:
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
    # - {name: prohibition_layer, type: "costmap_prohibition_layer_namespace::CostmapProhibitionLayer"}

  obstacle_layer:
    observation_sources: laser_scan_sensor

    laser_scan_sensor:
      data_type: LaserScan
      topic: /scan_filtered
      sensor_frame: laser_frame

      rolling_window: true
      marking: true
      clearing: true

      expected_update_rate: 10
      observation_persistence: 0.0   # 유령 장애물 빨리 삭제

      obstacle_range: 4.0             # 장애물 인식 최대 거리 (기존 2.5)
      raytrace_range: 5.0             # clearing 최대 거리 (기존 3.0)
      max_obstacle_height: 2.0

      inf_is_valid: true
      track_unknown_space: false

  inflation_layer:
    inflation_radius: 0.50           # 기존 0.75m
    cost_scaling_factor: 3.0

  footprint: [[0.145, 0.255], [0.145, -0.255], [-0.495, -0.255], [-0.495, 0.255]]
  footprint_padding: 0.03
